version: "3.9"

services:
  pgvector:
    image: pgvector/pgvector:pg17
    container_name: pai-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_USER: pai
      POSTGRES_PASSWORD: pai
      POSTGRES_DB: pai
    ports:
      # Bind to localhost only — not exposed to the network
      - "127.0.0.1:5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pai -d pai"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Resource limits — pgvector for a personal AI assistant does not need much
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  pgvector_data:
    driver: local
